version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookshelf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookshelf}
      POSTGRES_USER: ${POSTGRES_USER:-bookshelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookshelf}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookshelf} -d ${POSTGRES_DB:-bookshelf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bookshelf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  redis_data:
